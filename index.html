<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Matfer Bourgeat — Product Book</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
:root{--bg:#060604;--bg2:#0e0e0c;--surface:#161614;--border:rgba(255,255,255,0.07);--gold:#C9A84C;--gold-l:#E8D49A;--blue:#5B8FBF;--blue-l:#8FB8E0;--red:#B85C38;--red-l:#D4896A;--green:#8FAF7A;--green-l:#AECF9A;--text:#F0EDE6;--muted:rgba(240,237,232,0.42);--subtle:rgba(240,237,232,0.22);--font-d:'Cormorant Garamond',Georgia,serif;--font-u:'Jost','Helvetica Neue',sans-serif;--ease:cubic-bezier(0.4,0,0.2,1);--footer-h:56px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font-u)}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;transition:transform .35s var(--ease),opacity .35s var(--ease)}
.screen.hidden{pointer-events:none;opacity:0;transform:translateX(100%)}
.screen.hidden-back{pointer-events:none;opacity:0;transform:translateX(-30%)}
#loading{background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}
#loading img{height:40px;opacity:.7}
.spinner{width:28px;height:28px;border:1.5px solid rgba(255,255,255,.1);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-msg{font:300 10px/1 var(--font-u);letter-spacing:.3em;text-transform:uppercase;color:var(--muted)}
.loading-err{font:300 12px/1.5 var(--font-u);color:var(--red-l);text-align:center;max-width:280px;display:none;padding:0 20px}
.home-header{padding:max(18px,env(safe-area-inset-top)) 20px 10px;text-align:center;flex-shrink:0}
.home-logo{height:36px;object-fit:contain;display:block;margin:0 auto}
.search-wrap{padding:10px 16px;flex-shrink:0}
.search-box{display:flex;align-items:center;gap:10px;background:var(--surface);border:.5px solid var(--border);border-radius:2px;padding:0 14px;height:38px}
.search-box svg{width:14px;height:14px;stroke:var(--muted);flex-shrink:0}
.search-box input{flex:1;background:none;border:none;outline:none;font:300 13px/1 var(--font-u);color:var(--text)}
.search-box input::placeholder{color:var(--subtle)}
.search-clear{width:22px;height:22px;display:none;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;opacity:.5}
.search-clear svg{width:13px;height:13px;stroke:var(--muted)}
.search-clear.visible{display:flex}
.tabs-wrap{flex-shrink:0;padding:0 16px;border-bottom:.5px solid var(--border);position:relative}
.tabs{display:flex}
.tab{flex:1;text-align:center;padding:10px 0 9px;font:300 10px/1 var(--font-u);letter-spacing:.22em;text-transform:uppercase;color:var(--muted);cursor:pointer;transition:color .3s}
.tab.act-i{color:var(--gold)}.tab.act-s{color:var(--blue-l)}
.tab-bar{position:absolute;bottom:0;height:1.5px;transition:left .38s var(--ease),width .38s var(--ease),background .38s;z-index:2}
.catalog{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 16px calc(var(--footer-h) + 16px);scrollbar-width:none}
.catalog::-webkit-scrollbar{display:none}
.tab-panel{display:none}.tab-panel.active{display:block}
.sec-group{margin-top:20px}
.sec-group-title{font:300 8px/1 var(--font-u);letter-spacing:.38em;text-transform:uppercase;opacity:.65;margin-bottom:12px;padding-left:2px;color:var(--gold)}
.sec-group.blue .sec-group-title{color:var(--blue)}
.prod-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:0 2px}
.prod-card{cursor:pointer;position:relative;border-radius:2px;overflow:hidden;background:var(--surface);border:.5px solid var(--border);aspect-ratio:4/3}
.prod-card img{width:100%;height:100%;object-fit:cover;display:block}
.prod-card-ph{width:100%;height:100%;background:#fff;display:block}
.prod-card-label{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(to top,rgba(6,6,4,.92) 0%,transparent 100%);padding:20px 10px 8px}
.prod-card-tag{font:300 7px/1 var(--font-u);letter-spacing:.25em;text-transform:uppercase;color:var(--gold);opacity:.8;margin-bottom:4px}
.blue-card .prod-card-tag{color:var(--blue-l);opacity:.9}
.prod-card-name{font:300 12px/1.2 var(--font-d);color:var(--text)}
.prod-card.hs{display:none}
.home-footer{flex-shrink:0;height:var(--footer-h);background:var(--bg2);border-top:.5px solid var(--border);display:flex;align-items:center;justify-content:center;padding-bottom:env(safe-area-inset-bottom)}
.lang-toggle{display:flex;border:.5px solid var(--border);border-radius:2px;overflow:hidden}
.lang-btn{padding:7px 16px;font:300 9px/1 var(--font-u);letter-spacing:.2em;text-transform:uppercase;cursor:pointer;transition:background .2s,color .2s;color:var(--muted)}
.lang-btn.active{background:var(--surface);color:var(--gold)}
@media(orientation:landscape){.home-header{padding-top:max(10px,env(safe-area-inset-top))}.home-logo{height:26px}.search-wrap{padding:6px 16px}.prod-grid{grid-template-columns:repeat(4,1fr)}.sec-group{margin-top:14px}}
#section-view{background:var(--bg)}
.sv-hd{flex-shrink:0;background:var(--bg);border-bottom:.5px solid var(--border);padding:max(10px,env(safe-area-inset-top)) 14px 7px;display:flex;flex-direction:column;align-items:center;gap:5px}
.sv-hd-logo{height:36px;object-fit:contain;cursor:pointer;opacity:.6;transition:opacity .2s}
.sv-hd-row{display:flex;align-items:center;width:100%;gap:10px}
.sv-back{width:32px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:.65;flex-shrink:0}
.sv-back svg{width:18px;height:18px;stroke:var(--gold)}
.sv-title{font:300 15px/1.1 var(--font-d);color:var(--text);flex:1;text-align:center}
.sv-hd-sp{width:32px;flex-shrink:0}
.sub-wrap{flex-shrink:0;background:var(--bg2);border-bottom:.5px solid var(--border);position:relative}
.sub-nav{display:flex;justify-content:center;overflow-x:auto;scrollbar-width:none;padding:0 14px;position:relative}
.sub-nav::-webkit-scrollbar{display:none}
.sub-pill{font:300 9px/1 var(--font-u);letter-spacing:.18em;text-transform:uppercase;color:var(--muted);padding:10px 14px 9px;white-space:nowrap;cursor:pointer;transition:color .25s;flex-shrink:0}
.sub-pill.active{color:var(--pill-color,var(--gold-l))}
.sub-bar{position:absolute;bottom:0;left:0;height:2px;width:0;background:var(--gold);transition:left .3s var(--ease),width .3s var(--ease),background .3s;pointer-events:none;z-index:2}
.sv-main{flex:1;overflow:hidden;position:relative;display:flex}
.sv-outer{flex:1;overflow:hidden;position:relative;display:flex;flex-direction:column;width:100%;contain:layout}
.sv-track{display:flex;flex:1;transition:transform .35s var(--ease);will-change:transform}
.sv-slide{flex:0 0 100vw;width:100vw;max-width:100%;height:calc(100% - 20px);display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;touch-action:pan-y}
.sv-slide::-webkit-scrollbar{display:none}
.sv-img-block{flex-shrink:0;background:#000;display:flex;flex-direction:column}
.sv-img-wrap{width:100%;cursor:zoom-in;display:flex;align-items:center;justify-content:center;background:#000}
.sv-img-wrap img{width:100%;display:block;object-fit:contain;max-height:70vh}
.sv-caption{flex-shrink:0;padding:3px 16px 8px;background:var(--bg2)}
.sv-cap-title{font:300 15px/1.25 var(--font-d);color:var(--text);text-align:center}
.sv-arrow{position:absolute;top:50%;transform:translateY(-50%);width:38px;height:64px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:20;background:rgba(6,6,4,.5)}
.sv-arrow.left{left:0;border-radius:0 2px 2px 0}.sv-arrow.right{right:0;border-radius:2px 0 0 2px}
.sv-arrow svg{width:17px;height:17px;stroke:var(--gold)}
.sv-arrow.dis{opacity:.12;pointer-events:none}
.sv-dot-bar{position:absolute;bottom:0;left:0;right:0;height:20px;background:var(--bg2);border-top:.5px solid var(--border);display:flex;align-items:center;justify-content:center;gap:6px;z-index:5}
.sv-dot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.25);transition:background .2s}
.sv-dot.active{background:var(--dot-color,var(--gold))}
.sv-footer{flex-shrink:0;height:var(--footer-h);background:var(--bg2);border-top:.5px solid var(--border);display:flex;align-items:center;justify-content:center;padding-bottom:env(safe-area-inset-bottom)}
.find-cta{display:flex;align-items:center;gap:10px;padding:0 22px;height:34px;border:.5px solid rgba(201,168,76,.3);border-radius:1px;cursor:pointer;text-decoration:none}
.find-cta-text{font:300 9px/1 var(--font-u);letter-spacing:.28em;text-transform:uppercase;color:var(--gold)}
.find-cta svg{width:12px;height:12px;stroke:var(--gold);opacity:.6}
.sv-blue .find-cta{border-color:rgba(91,143,191,.3)}.sv-blue .find-cta-text{color:var(--blue-l)}.sv-blue .find-cta svg{stroke:var(--blue-l)}
@media(orientation:landscape){.sv-hd{padding-top:max(6px,env(safe-area-inset-top));gap:3px}.sv-hd-logo{height:26px}.sv-dot-bar{display:none}.sv-footer{height:42px}.sub-pill{padding:7px 12px}}
#lightbox{position:fixed;inset:0;z-index:100;background:#000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
#lightbox.open{opacity:1;pointer-events:all}
.lb-close{position:absolute;top:max(16px,env(safe-area-inset-top));right:16px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:10;background:rgba(0,0,0,.5);border-radius:50%;border:.5px solid rgba(255,255,255,.15)}
.lb-close svg{width:18px;height:18px;stroke:rgba(255,255,255,.8)}
.lb-wrap{width:100%;height:100%;overflow:hidden;display:flex;align-items:center;justify-content:center;touch-action:none}
.lb-img{display:block;max-width:100%;max-height:100%;object-fit:contain;transform-origin:center center;cursor:grab;user-select:none;-webkit-user-drag:none}
.lb-hint{position:absolute;bottom:max(20px,env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);font:300 9px/1 var(--font-u);letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.25);white-space:nowrap;pointer-events:none;transition:opacity .4s}
</style>
</head>
<body>

<div class="screen" id="loading">
  <img id="ll" src="" alt="Matfer Bourgeat">
  <div class="spinner"></div>
  <div class="loading-msg" id="lm">Chargement…</div>
  <div class="loading-err" id="le"></div>
</div>

<div class="screen hidden" id="home">
  <div class="home-header"><img class="home-logo" id="hl" src="" alt="Matfer Bourgeat"></div>
  <div class="search-wrap">
    <div class="search-box">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="si" placeholder="Rechercher un produit…">
      <div class="search-clear" id="sc" onclick="clrSearch()"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg></div>
    </div>
  </div>
  <div class="tabs-wrap">
    <div class="tabs">
      <div class="tab act-i" id="ti" onclick="switchTab('i')"><span id="ti-l">Innovations</span></div>
      <div class="tab" id="ts" onclick="switchTab('s')"><span id="ts-l">Sur Mesure</span></div>
    </div>
    <div class="tab-bar" id="tb"></div>
  </div>
  <div class="catalog">
    <div class="tab-panel active" id="pi"></div>
    <div class="tab-panel" id="ps"></div>
  </div>
  <div class="home-footer">
    <div class="lang-toggle">
      <div class="lang-btn active" id="lf" onclick="setLang('fr')">FR</div>
      <div class="lang-btn" id="len" onclick="setLang('en')">EN</div>
    </div>
  </div>
</div>

<div class="screen hidden" id="section-view">
  <div class="sv-hd">
    <img class="sv-hd-logo" id="sl" src="" alt="MB" onclick="goHome()">
    <div class="sv-hd-row">
      <div class="sv-back" onclick="goHome()"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg></div>
      <div class="sv-title" id="svt"></div>
      <div class="sv-hd-sp"></div>
    </div>
  </div>
  <div class="sub-wrap">
    <div class="sub-nav" id="sn"><div class="sub-bar" id="sb"></div></div>
  </div>
  <div class="sv-main">
    <div class="sv-outer" id="svo">
      <div class="sv-track" id="svtr"></div>
      <div class="sv-arrow left dis" id="al" onclick="slideNav(-1)"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></div>
      <div class="sv-arrow right" id="ar" onclick="slideNav(1)"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></div>
      <div class="sv-dot-bar" id="sdb"></div>
    </div>
  </div>
  <div class="sv-footer">
    <a class="find-cta" id="fca" href="#" target="_blank">
      <span class="find-cta-text" id="fct">Infos produit</span>
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14L21 3"/></svg>
    </a>
  </div>
</div>

<div id="lightbox">
  <div class="lb-close" onclick="lbClose()"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg></div>
  <div class="lb-wrap" id="lbw"></div>
  <div class="lb-hint" id="lbh">Double-tap pour réinitialiser le zoom</div>
</div>

function dec(s) {
  var r = s;
  try { r = decodeURIComponent(s); } catch(ignore) {}
  return r;
}
function stripNum(s) {
  var d = dec(s);
  return d.replace(/^[0-9]+[_ ]?/, '').replace(/_/g, ' ').trim();
}
function numKey(s) {
  var d = dec(s);
  var m = d.match(/^([0-9]+)/);
  return m ? parseInt(m[1], 10) : 999;
}
function isCoverDir(s) {
  var d = dec(s).toLowerCase();
  return d === 'couverture' || d === 'cover';
}
function isImg(s) {
  var d = dec(s);
  return /\.(jpg|jpeg|png|gif|webp)$/i.test(d);
}
function fileTitle(s) {
  var d = dec(s);
  var base = d.replace(/\.[^.]+$/, '');
  return base.replace(/^[0-9]+[_ ]?/, '').replace(/_/g, ' ').trim();
}
function rawUrl(p) {
  var parts = p.split('/');
  var enc = parts.map(function(seg) { return encodeURIComponent(dec(seg)); }).join('/');
  return RAW + '/' + enc;
}

function buildCat(tree) {
  var secs = {};
  for (var i = 0; i < tree.length; i++) {
    var node = tree[i];
    if (node.type !== 'blob') continue;
    var rawParts = node.path.split('/');
    var parts = rawParts.map(dec);
    if (parts.length < 6) continue;
    if (parts[0] !== IMG_ROOT) continue;
    var fname = parts[parts.length - 1];
    if (!isImg(fname)) continue;

    var top = parts[1];
    var isSM = /sur.?mesure/i.test(top.replace(/^[0-9]+[_ ]?/, ''));
    var tabGrp = stripNum(parts[2]);
    var secName = stripNum(parts[3]);
    var subDir = parts[4];
    var subName = stripNum(subDir);

    var key = (isSM ? 'sm:' : 'in:') + tabGrp + '/' + secName;
    if (!secs[key]) {
      secs[key] = {
        key: key, isSM: isSM,
        tabGrp: tabGrp, secName: secName,
        tOrd: numKey(parts[2]),
        sOrd: numKey(parts[3]),
        cover: null, subs: {}, subOrd: {}
      };
    }
    var sec = secs[key];
    if (isCoverDir(subDir)) {
      if (!sec.cover) sec.cover = rawUrl(node.path);
    } else {
      if (!sec.subs[subName]) {
        sec.subs[subName] = [];
        sec.subOrd[subName] = numKey(subDir);
      }
      sec.subs[subName].push({ path: node.path, file: fname });
    }
  }

  var arr = Object.keys(secs).map(function(k) { return secs[k]; });
  arr.sort(function(a, b) {
    if (a.isSM !== b.isSM) return a.isSM ? 1 : -1;
    if (a.tabGrp !== b.tabGrp) return a.tOrd - b.tOrd;
    return a.sOrd - b.sOrd;
  });
  for (var j = 0; j < arr.length; j++) {
    var s = arr[j];
    for (var sub in s.subs) {
      s.subs[sub].sort(function(a, b) {
        var na = numKey(a.file), nb = numKey(b.file);
        if (na !== nb) return na - nb;
        var ta = fileTitle(a.file), tb = fileTitle(b.file);
        if (!ta && tb) return -1;
        if (ta && !tb) return 1;
        return a.file < b.file ? -1 : 1;
      });
    }
  }
  return arr;
}

function renderHome() {
  var pi = document.getElementById('pi');
  var ps = document.getElementById('ps');
  pi.innerHTML = '';
  ps.innerHTML = '';
  var iGrps = {}, sGrps = {};
  for (var i = 0; i < SECTIONS.length; i++) {
    var sec = SECTIONS[i];
    if (sec.isSM) { if (!sGrps[sec.tabGrp]) sGrps[sec.tabGrp] = []; sGrps[sec.tabGrp].push(sec); }
    else { if (!iGrps[sec.tabGrp]) iGrps[sec.tabGrp] = []; iGrps[sec.tabGrp].push(sec); }
  }
  renderGroups(pi, iGrps, false);
  renderGroups(ps, sGrps, true);
}

function renderGroups(panel, groups, isSM) {
  for (var grp in groups) {
    var g = document.createElement('div');
    g.className = 'sec-group' + (isSM ? ' blue' : '');
    g.dataset.grp = grp;
    var gid = 'g' + grp.replace(/[^a-z0-9]/gi, '');
    g.innerHTML = '<div class="sec-group-title">' + grp + '</div><div class="prod-grid" id="' + gid + '"></div>';
    panel.appendChild(g);
    var secs = groups[grp];
    for (var i = 0; i < secs.length; i++) renderCard(secs[i], gid);
  }
}

function renderCard(sec, gid) {
  var grid = document.getElementById(gid);
  if (!grid) return;
  var card = document.createElement('div');
  card.className = 'prod-card' + (sec.isSM ? ' blue-card' : '');
  card.dataset.kw = (sec.secName + ' ' + sec.tabGrp).toLowerCase();
  card.dataset.sk = sec.key;
  var img = sec.cover ? '<img src="' + sec.cover + '" loading="lazy" alt="">' : '<div class="prod-card-ph"></div>';
  card.innerHTML = img + '<div class="prod-card-label"><div class="prod-card-tag">' + sec.tabGrp + '</div><div class="prod-card-name">' + sec.secName + '</div></div>';
  card.addEventListener('click', function(sk) { return function() { openSec(sk); }; }(sec.key));
  grid.appendChild(card);
}

function switchTab(t) {
  document.getElementById('pi').classList.toggle('active', t === 'i');
  document.getElementById('ps').classList.toggle('active', t === 's');
  document.getElementById('ti').classList.toggle('act-i', t === 'i');
  document.getElementById('ti').classList.remove('act-s');
  document.getElementById('ts').classList.toggle('act-s', t === 's');
  document.getElementById('ts').classList.remove('act-i');
  updateTabBar(t);
}
function updateTabBar(t) {
  var el = document.getElementById(t === 'i' ? 'ti' : 'ts');
  var wrap = document.querySelector('.tabs-wrap');
  var bar = document.getElementById('tb');
  var r = el.getBoundingClientRect(), wr = wrap.getBoundingClientRect();
  bar.style.left = (r.left - wr.left) + 'px';
  bar.style.width = r.width + 'px';
  bar.style.background = t === 's' ? 'var(--blue)' : 'var(--gold)';
}

function runSearch(q) {
  q = q.toLowerCase().trim();
  var cards = document.querySelectorAll('.prod-card');
  for (var i = 0; i < cards.length; i++) {
    cards[i].classList.toggle('hs', q.length > 0 && cards[i].dataset.kw.indexOf(q) < 0);
  }
  var grps = document.querySelectorAll('.sec-group');
  for (var j = 0; j < grps.length; j++) {
    var gc = grps[j].querySelectorAll('.prod-card');
    var allHidden = true;
    for (var k = 0; k < gc.length; k++) { if (!gc[k].classList.contains('hs')) { allHidden = false; break; } }
    grps[j].style.display = (q.length > 0 && allHidden) ? 'none' : '';
  }
  document.getElementById('sc').classList.toggle('visible', q.length > 0);
}
function clrSearch() { document.getElementById('si').value = ''; runSearch(''); }
document.getElementById('si').addEventListener('input', function() { runSearch(this.value); });

function setLang(l) {
  LANG = l;
  document.getElementById('lf').classList.toggle('active', l === 'fr');
  document.getElementById('len').classList.toggle('active', l === 'en');
  var tx = TX[l];
  document.getElementById('si').placeholder = tx.si;
  document.getElementById('ti-l').textContent = tx.ti;
  document.getElementById('ts-l').textContent = tx.ts;
  document.getElementById('lbh').textContent = tx.lh;
  if (curSec) document.getElementById('fct').textContent = tx[curSec.isSM ? 'fs' : 'fi'];
}

function getLink(sec) {
  if (sec.isSM) return 'https://digital.matferbourgeat.com/tailor';
  var name = sec.secName.toLowerCase();
  for (var k in LINKS) {
    if (k.toLowerCase() === name || name.indexOf(k.toLowerCase()) >= 0 || k.toLowerCase().indexOf(name) >= 0) return LINKS[k];
  }
  return 'https://digital.matferbourgeat.com';
}

function getSubColor(sec, i) {
  var pal = sec.isSM ? SM_PAL : INNOV_PAL;
  return pal[i % pal.length];
}

function openSec(key) {
  curSec = null;
  for (var i = 0; i < SECTIONS.length; i++) { if (SECTIONS[i].key === key) { curSec = SECTIONS[i]; break; } }
  if (!curSec) return;
  var sv = document.getElementById('section-view');
  sv.classList.toggle('sv-blue', curSec.isSM);
  sv.style.setProperty('--dot-color', curSec.isSM ? 'var(--blue-l)' : 'var(--gold-l)');
  document.getElementById('svt').textContent = curSec.secName;
  document.getElementById('fct').textContent = TX[LANG][curSec.isSM ? 'fs' : 'fi'];
  document.getElementById('fca').href = getLink(curSec);
  buildSubNav();
  buildSlides();
  goSlide(0, false);
  document.getElementById('home').classList.add('hidden-back');
  sv.classList.remove('hidden');
  initSwipe();
}

function orderedSubs() {
  if (!curSec) return [];
  var keys = Object.keys(curSec.subs);
  keys.sort(function(a, b) { return (curSec.subOrd[a] || 99) - (curSec.subOrd[b] || 99); });
  return keys;
}

function buildSubNav() {
  var nav = document.getElementById('sn');
  var bar = document.getElementById('sb');
  var children = Array.prototype.slice.call(nav.children);
  for (var i = 0; i < children.length; i++) { if (!children[i].id) children[i].parentNode.removeChild(children[i]); }
  var subs = orderedSubs();
  for (var j = 0; j < subs.length; j++) {
    var col = getSubColor(curSec, j);
    var pill = document.createElement('div');
    pill.className = 'sub-pill' + (j === 0 ? ' active' : '');
    pill.textContent = subs[j];
    pill.dataset.si = j;
    pill.dataset.cb = col.b;
    pill.dataset.cl = col.l;
    pill.style.setProperty('--pill-color', col.l);
    pill.addEventListener('click', function(idx) { return function() { goSlide(idx, true); }; }(j));
    nav.appendChild(pill);
  }
  setTimeout(function() { updateSubBar(0); }, 10);
}

function updateSubBar(idx) {
  var nav = document.getElementById('sn');
  var bar = document.getElementById('sb');
  var pill = nav.querySelector('[data-si="' + idx + '"]');
  if (!pill || !bar) return;
  bar.style.left = pill.offsetLeft + 'px';
  bar.style.width = pill.offsetWidth + 'px';
  bar.style.background = pill.dataset.cb || 'var(--gold)';
}

function buildSlides() {
  allSubs = orderedSubs();
  var track = document.getElementById('svtr');
  track.innerHTML = '';
  var dotbar = document.getElementById('sdb');
  dotbar.innerHTML = '';
  for (var si = 0; si < allSubs.length; si++) {
    var subName = allSubs[si];
    var col = getSubColor(curSec, si);
    var slides = curSec.subs[subName];
    var panel = document.createElement('div');
    panel.className = 'sv-slide';
    for (var ii = 0; ii < slides.length; ii++) {
      var slide = slides[ii];
      var block = document.createElement('div');
      block.className = 'sv-img-block';
      var wrap = document.createElement('div');
      wrap.className = 'sv-img-wrap';
      var imgEl = document.createElement('img');
      imgEl.src = rawUrl(slide.path);
      imgEl.loading = 'lazy';
      imgEl.alt = '';
      wrap.appendChild(imgEl);
      wrap.addEventListener('click', function(url) { return function() { lbOpen(url); }; }(rawUrl(slide.path)));
      block.appendChild(wrap);
      var title = fileTitle(slide.file);
      if (title) {
        var cap = document.createElement('div');
        cap.className = 'sv-caption';
        var tEl = document.createElement('div');
        tEl.className = 'sv-cap-title';
        tEl.style.color = col.l;
        tEl.textContent = title;
        cap.appendChild(tEl);
        block.appendChild(cap);
      }
      panel.appendChild(block);
    }
    track.appendChild(panel);
    var dot = document.createElement('div');
    dot.className = 'sv-dot' + (si === 0 ? ' active' : '');
    dotbar.appendChild(dot);
  }
}

function goSlide(idx, animate) {
  if (idx < 0) idx = 0;
  if (idx >= allSubs.length) idx = allSubs.length - 1;
  curSlide = idx;
  var track = document.getElementById('svtr');
  track.style.transition = animate ? 'transform .35s var(--ease)' : 'none';
  track.style.transform = 'translateX(-' + (idx * 100) + '%)';
  var panels = track.querySelectorAll('.sv-slide');
  if (panels[idx]) panels[idx].scrollTop = 0;
  var pills = document.querySelectorAll('.sub-pill');
  for (var i = 0; i < pills.length; i++) pills[i].classList.toggle('active', parseInt(pills[i].dataset.si) === idx);
  var dots = document.querySelectorAll('.sv-dot');
  for (var j = 0; j < dots.length; j++) dots[j].classList.toggle('active', j === idx);
  document.getElementById('al').classList.toggle('dis', idx === 0);
  document.getElementById('ar').classList.toggle('dis', idx === allSubs.length - 1);
  updateSubBar(idx);
  var ap = document.querySelector('.sub-pill.active');
  if (ap) ap.scrollIntoView({ inline: 'center', behavior: 'smooth', block: 'nearest' });
}
function slideNav(dir) { goSlide(curSlide + dir, true); }

function goHome() {
  document.getElementById('home').classList.remove('hidden-back');
  document.getElementById('section-view').classList.add('hidden');
  curSec = null;
}

function initSwipe() {
  if (swipeInit) return;
  swipeInit = true;
  var outer = document.getElementById('svo');
  var tx = 0, ty = 0, decided = false, isH = false;
  outer.addEventListener('touchstart', function(e) {
    if (lbScale > 1) return;
    tx = e.touches[0].clientX; ty = e.touches[0].clientY;
    decided = false; isH = false;
  }, { passive: true });
  outer.addEventListener('touchmove', function(e) {
    if (lbScale > 1) return;
    if (decided && !isH) return;
    var dx = e.touches[0].clientX - tx, dy = e.touches[0].clientY - ty;
    if (!decided && (Math.abs(dx) > 6 || Math.abs(dy) > 6)) { decided = true; isH = Math.abs(dx) > Math.abs(dy); }
    if (isH) e.preventDefault();
  }, { passive: false });
  outer.addEventListener('touchend', function(e) {
    if (!isH) return;
    var dx = e.changedTouches[0].clientX - tx;
    if (Math.abs(dx) > 40) slideNav(dx < 0 ? 1 : -1);
  }, { passive: true });
}

function lbOpen(url) {
  var wrap = document.getElementById('lbw');
  wrap.innerHTML = '';
  var img = document.createElement('img');
  img.className = 'lb-img';
  img.src = url;
  img.id = 'lbi';
  wrap.appendChild(img);
  lbImgEl = img;
  lbScale = 1; lbX = 0; lbY = 0;
  lbApply(false);
  document.getElementById('lightbox').classList.add('open');
  var hint = document.getElementById('lbh');
  hint.style.opacity = '1';
  setTimeout(function() { hint.style.opacity = '0'; }, 2800);
  lbGestures();
}
function lbClose() { document.getElementById('lightbox').classList.remove('open'); }
function lbApply(anim) {
  if (!lbImgEl) return;
  lbImgEl.style.transition = anim ? 'transform .25s' : 'none';
  lbImgEl.style.transform = 'translate(' + lbX + 'px,' + lbY + 'px) scale(' + lbScale + ')';
}
function lbClamp() {
  if (!lbImgEl) return;
  var w = document.getElementById('lbw');
  var mx = Math.max(0, (lbImgEl.clientWidth * lbScale - w.clientWidth) / 2);
  var my = Math.max(0, (lbImgEl.clientHeight * lbScale - w.clientHeight) / 2);
  if (lbX < -mx) lbX = -mx; if (lbX > mx) lbX = mx;
  if (lbY < -my) lbY = -my; if (lbY > my) lbY = my;
}
function lbGestures() {
  var wrap = document.getElementById('lbw');
  wrap.onwheel = function(e) {
    e.preventDefault();
    lbScale = Math.max(1, Math.min(6, lbScale * (e.deltaY > 0 ? 0.85 : 1.18)));
    if (lbScale === 1) { lbX = 0; lbY = 0; }
    lbClamp(); lbApply(false);
  };
  wrap.ondblclick = function() { lbScale = 1; lbX = 0; lbY = 0; lbApply(true); };
  var t0x = 0, t0y = 0, ld = 0, pan = false, lt = 0;
  wrap.ontouchstart = function(e) {
    e.preventDefault();
    var now = Date.now();
    if (e.touches.length === 1) {
      if (now - lt < 280) { lbScale = 1; lbX = 0; lbY = 0; lbApply(true); lt = 0; return; }
      lt = now; t0x = e.touches[0].clientX - lbX; t0y = e.touches[0].clientY - lbY; pan = true;
    } else if (e.touches.length === 2) {
      pan = false;
      var dx = e.touches[1].clientX - e.touches[0].clientX, dy = e.touches[1].clientY - e.touches[0].clientY;
      ld = Math.sqrt(dx * dx + dy * dy);
    }
  };
  wrap.ontouchmove = function(e) {
    e.preventDefault();
    if (e.touches.length === 1 && pan && lbScale > 1) {
      lbX = e.touches[0].clientX - t0x; lbY = e.touches[0].clientY - t0y;
      lbClamp(); lbApply(false);
    } else if (e.touches.length === 2) {
      var dx = e.touches[1].clientX - e.touches[0].clientX, dy = e.touches[1].clientY - e.touches[0].clientY;
      var d = Math.sqrt(dx * dx + dy * dy);
      lbScale = Math.max(1, Math.min(6, lbScale * d / ld)); ld = d;
      if (lbScale === 1) { lbX = 0; lbY = 0; }
      lbClamp(); lbApply(false);
    }
  };
  wrap.ontouchend = function(e) { if (e.touches.length < 2) pan = e.touches.length === 1; };
}
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') lbClose(); });

async function init() {
  var logos = ['ll','hl','sl'];
  for (var i = 0; i < logos.length; i++) document.getElementById(logos[i]).src = LOGO;
  try {
    var r = await fetch(API + '/git/trees/' + BRANCH + '?recursive=1', { headers: { Accept: 'application/vnd.github.v3+json' } });
    if (!r.ok) throw new Error('GitHub API ' + r.status);
    var data = await r.json();
    try {
      var lr = await fetch(RAW + '/liens.json');
      if (lr.ok) LINKS = await lr.json();
    } catch(e2) {}
    SECTIONS = buildCat(data.tree);
    if (SECTIONS.length === 0) throw new Error('Aucune image trouvée dans ' + IMG_ROOT + '/');
    renderHome();
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('home').classList.remove('hidden');
    setTimeout(function() { updateTabBar('i'); }, 50);
  } catch(err) {
    var le = document.getElementById('le');
    le.textContent = 'Erreur : ' + err.message;
    le.style.display = 'block';
    document.querySelector('.spinner').style.display = 'none';
    console.error(err);
  }
}
init();
</script>
